<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Minecraft 2D + 3D Builder</title>

  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel2: #1f2937;
      --line: #374151;
      --text: #e5e7eb;
      --accent: #22c55e;
      --ghost: rgba(148, 163, 184, 0.25);
      --cell: 26px;
      --gap: 1px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 12px;
      padding: 12px;
      height: 100vh;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .viewer {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar, .toolbar, .status, .palette {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .topbar {
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .status {
      font-size: 14px;
      opacity: .95;
      justify-content: flex-end;
    }

    button, input[type="number"] {
      background: #0b1220;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 11px;
      font: inherit;
    }

    button:hover { border-color: var(--accent); cursor: pointer; }
    button.active { outline: 2px solid var(--accent); }
    button.primary { background: #14532d; border-color: #22c55e; }

    .grid-wrap {
      overflow: auto;
      display: grid;
      justify-content: center;
      padding: 8px 0;
      flex: 1;
      min-height: 0;
    }

    .grid {
      display: grid;
      gap: var(--gap);
      background: var(--line);
      padding: var(--gap);
      border-radius: 12px;
      user-select: none;
    }

    .cell {
      width: var(--cell);
      height: var(--cell);
      background: #0b1220;
      border: 0;
      padding: 0;
      outline: none;
    }

    .ghost {
      box-shadow: inset 0 0 0 999px var(--ghost);
    }

    .legend {
      margin-top: 10px;
      font-size: 13px;
      opacity: .88;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .swatch {
      display: inline-block;
      width: 11px;
      height: 11px;
      border-radius: 3px;
      margin-right: 5px;
      vertical-align: middle;
    }

    .palette {
      margin: 8px 0 10px;
    }

    .palette button {
      padding: 7px 9px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chip {
      width: 13px;
      height: 13px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,.25);
    }

    #threeWrap {
      flex: 1;
      min-height: 0;
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(180deg, #111827, #0b1220);
      border: 1px solid var(--line);
    }

    .viewerTitle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .hint {
      font-size: 13px;
      opacity: .8;
    }

    .file {
      display: none;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.156.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.156.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="app">
    <div class="viewer">
      <div class="viewerTitle">
        <strong>3D náhled</strong>
        <span class="hint">Otáčej myší</span>
      </div>
      <div id="threeWrap"></div>
    </div>

    <div class="panel">
      <div class="topbar">
        <div class="toolbar">
          <button id="prevLayer">◀ Vrstva</button>
          <button id="nextLayer" class="primary">Vrstva ▶</button>
          <button id="addLayer">+ Přidat vrstvu</button>
          <button id="clearLayer">Vymazat vrstvu</button>
          <button id="clearAll">Vymazat vše</button>
          <button id="exportJson">Export JSON</button>
          <button id="importJson">Import JSON</button>
          <input id="fileInput" class="file" type="file" accept=".json,application/json">
        </div>
        <div class="status">
          <span>Vrstva: <strong id="layerInfo">1 / 1</strong></span>
          <span>Mřížka: <strong id="sizeInfo"></strong></span>
          <label>Velikost:
            <input id="gridSize" type="number" min="4" max="64" value="16">
          </label>
          <button id="applySize">Použít</button>
        </div>
      </div>

      <div id="palette" class="palette"></div>

      <div class="grid-wrap">
        <div id="grid" class="grid"></div>
      </div>

      <div class="legend">
        <span><span class="swatch" style="background:#4ade80"></span>Vybraná barva</span>
        <span><span class="swatch" style="background:rgba(148,163,184,.25)"></span>Předchozí vrstva</span>
        <span class="hint">Levý klik = položit blok, pravý klik = smazat, šipky = vrstvy.</span>
      </div>
    </div>
  </div>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  const STORAGE_KEY = 'minecraft-layer-planner-v5';

  const COLORS = [
    { name: 'black', value: '#000000', chip: '#000000' },
    { name: 'white', value: '#ffffff', chip: '#ffffff' },
    { name: 'gray', value: '#808080', chip: '#808080' },
    { name: 'silver', value: '#c0c0c0', chip: '#c0c0c0' },
    { name: 'red', value: '#ff5555', chip: '#ff5555' },
    { name: 'orange', value: '#ff8800', chip: '#ff8800' },
    { name: 'yellow', value: '#ffff55', chip: '#ffff55' },
    { name: 'lime', value: '#55ff55', chip: '#55ff55' },
    { name: 'green', value: '#008000', chip: '#008000' },
    { name: 'aqua', value: '#55ffff', chip: '#55ffff' },
    { name: 'cyan', value: '#00aaaa', chip: '#00aaaa' },
    { name: 'blue', value: '#5555ff', chip: '#5555ff' },
    { name: 'navy', value: '#000080', chip: '#000080' },
    { name: 'purple', value: '#800080', chip: '#800080' },
    { name: 'violet', value: '#ee82ee', chip: '#ee82ee' },
    { name: 'pink', value: '#ff77aa', chip: '#ff77aa' },
    { name: 'brown', value: '#8b5a2b', chip: '#8b5a2b' },
    { name: 'tan', value: '#d2b48c', chip: '#d2b48c' },
    { name: 'olive', value: '#808000', chip: '#808000' },
    { name: 'teal', value: '#008080', chip: '#008080' },
    { name: 'maroon', value: '#800000', chip: '#800000' },
    { name: 'chocolate', value: '#d2691e', chip: '#d2691e' },
    { name: 'khaki', value: '#f0e68c', chip: '#f0e68c' },
    { name: 'crimson', value: '#dc143c', chip: '#dc143c' }
  ];

  let state = {
    size: 16,
    layer: 0,
    selectedColor: 2,
    layers: [emptyLayer(16)]
  };

  function emptyLayer(size) {
    return Array.from({ length: size }, () => Array(size).fill(null));
  }

  function loadState() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    try {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.layers) && parsed.size) state = parsed;
    } catch {}
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function ensureLayer(n) {
    while (state.layers.length <= n) state.layers.push(emptyLayer(state.size));
  }

  function resizeAll(newSize) {
    const newLayers = state.layers.map(layer => {
      const out = emptyLayer(newSize);
      for (let y = 0; y < Math.min(newSize, layer.length); y++) {
        for (let x = 0; x < Math.min(newSize, layer[y].length); x++) {
          out[y][x] = layer[y][x];
        }
      }
      return out;
    });
    state.size = newSize;
    state.layers = newLayers.length ? newLayers : [emptyLayer(newSize)];
    state.layer = Math.min(state.layer, state.layers.length - 1);
  }

  function renderPalette() {
    const palette = document.getElementById('palette');
    palette.innerHTML = '';
    COLORS.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = i === state.selectedColor ? 'active' : '';
      btn.type = 'button';
      btn.innerHTML = `<span class="chip" style="background:${c.chip}"></span>${c.name}`;
      btn.onclick = () => {
        state.selectedColor = i;
        saveState();
        renderPalette();
      };
      palette.appendChild(btn);
    });
  }

  function cellStyle(value) {
    if (!value) return '';
    return `background:${value}; box-shadow: inset 0 0 0 1px rgba(0,0,0,.18);`;
  }

  function renderEditor() {
    ensureLayer(state.layer);
    const grid = document.getElementById('grid');
    const layerInfo = document.getElementById('layerInfo');
    const sizeInfo = document.getElementById('sizeInfo');
    grid.innerHTML = '';
    grid.style.gridTemplateColumns = `repeat(${state.size}, var(--cell))`;

    const prev = state.layer > 0 ? state.layers[state.layer - 1] : null;
    const cur = state.layers[state.layer];

    for (let y = 0; y < state.size; y++) {
      for (let x = 0; x < state.size; x++) {
        const btn = document.createElement('button');
        btn.className = 'cell';
        if (prev && prev[y][x]) btn.classList.add('ghost');
        if (cur[y][x]) btn.style = cellStyle(cur[y][x]);

        btn.addEventListener('click', () => {
          cur[y][x] = COLORS[state.selectedColor].value;
          saveState();
          renderEditor();
          render3D();
        });

        btn.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          cur[y][x] = null;
          saveState();
          renderEditor();
          render3D();
        });

        grid.appendChild(btn);
      }
    }

    layerInfo.textContent = `${state.layer + 1} / ${state.layers.length}`;
    sizeInfo.textContent = `${state.size} × ${state.size}`;
    document.getElementById('prevLayer').disabled = state.layer === 0;
    document.getElementById('nextLayer').disabled = state.layer >= state.layers.length - 1;
    renderPalette();
  }

  function exportJSON() {
    const data = {
      app: 'Minecraft 2D + 3D Builder',
      version: 5,
      size: state.size,
      layers: state.layers,
      colors: COLORS,
      selectedColor: state.selectedColor,
      createdAt: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `minecraft-build-${state.size}x${state.size}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function importJSONFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed || !Array.isArray(parsed.layers) || !parsed.size) {
          alert('Neplatný JSON soubor.');
          return;
        }
        state = {
          size: parsed.size,
          layer: Math.min(parsed.layer ?? 0, parsed.layers.length - 1),
          selectedColor: parsed.selectedColor ?? 2,
          layers: parsed.layers
        };
        document.getElementById('gridSize').value = state.size;
        saveState();
        renderEditor();
        render3D();
      } catch {
        alert('Soubor se nepodařilo načíst.');
      }
    };
    reader.readAsText(file);
  }

  document.getElementById('prevLayer').onclick = () => {
    state.layer = Math.max(0, state.layer - 1);
    saveState();
    renderEditor();
  };

  document.getElementById('nextLayer').onclick = () => {
    ensureLayer(state.layer + 1);
    state.layer = Math.min(state.layers.length - 1, state.layer + 1);
    saveState();
    renderEditor();
  };

  document.getElementById('addLayer').onclick = () => {
    state.layers.push(emptyLayer(state.size));
    state.layer = state.layers.length - 1;
    saveState();
    renderEditor();
    render3D();
  };

  document.getElementById('clearLayer').onclick = () => {
    state.layers[state.layer] = emptyLayer(state.size);
    saveState();
    renderEditor();
    render3D();
  };

  document.getElementById('clearAll').onclick = () => {
    if (!confirm('Opravdu smazat vše?')) return;
    state = { size: state.size, layer: 0, selectedColor: state.selectedColor, layers: [emptyLayer(state.size)] };
    saveState();
    renderEditor();
    render3D();
  };

  document.getElementById('applySize').onclick = () => {
    const n = Math.max(4, Math.min(64, parseInt(document.getElementById('gridSize').value || '16', 10)));
    resizeAll(n);
    saveState();
    renderEditor();
    render3D();
  };

  document.getElementById('exportJson').onclick = exportJSON;
  document.getElementById('importJson').onclick = () => document.getElementById('fileInput').click();
  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) importJSONFile(file);
    e.target.value = '';
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') document.getElementById('prevLayer').click();
    if (e.key === 'ArrowRight') document.getElementById('nextLayer').click();
  });

  const wrap = document.getElementById('threeWrap');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0b1220);

  const camera = new THREE.OrthographicCamera(-20, 20, 20, -20, 0.1, 1000);
  camera.position.set(30, 30, 30);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  wrap.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.target.set(0, 0, 0);
  controls.update();

  const ambient = new THREE.AmbientLight(0xffffff, 1.2);
  scene.add(ambient);

  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(20, 40, 10);
  scene.add(dir);

  const baseMat = new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 1, metalness: 0 });
  let buildGroup = new THREE.Group();
  scene.add(buildGroup);

  function resizeRenderer() {
    const w = wrap.clientWidth;
    const h = wrap.clientHeight;
    renderer.setSize(w, h, false);
    const aspect = w / h;
    const frustum = 22;
    camera.left = -frustum * aspect;
    camera.right = frustum * aspect;
    camera.top = frustum;
    camera.bottom = -frustum;
    camera.updateProjectionMatrix();
  }

  function render3D() {
    scene.remove(buildGroup);
    buildGroup = new THREE.Group();

    const half = (state.size - 1) / 2;
    const boxGeo = new THREE.BoxGeometry(1, 1, 1);

    for (let z = 0; z < state.layers.length; z++) {
      const layer = state.layers[z];
      for (let y = 0; y < state.size; y++) {
        for (let x = 0; x < state.size; x++) {
          const val = layer?.[y]?.[x];
          if (!val) continue;
          const mat = new THREE.MeshStandardMaterial({ color: val, roughness: 0.95, metalness: 0.02 });
          const mesh = new THREE.Mesh(boxGeo, mat);
          mesh.position.set(x - half, z, y - half);
          buildGroup.add(mesh);
        }
      }
    }

    if (buildGroup.children.length === 0) {
      const base = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 4), baseMat);
      base.position.y = -0.1;
      buildGroup.add(base);
    }

    scene.add(buildGroup);
    controls.target.set(0, Math.max(0, (state.layers.length - 1) / 2), 0);
    controls.update();
  }

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    resizeRenderer();
  });

  loadState();
  document.getElementById('gridSize').value = state.size;
  resizeRenderer();
  renderEditor();
  render3D();
  animate();
</script>
</body>
</html>
